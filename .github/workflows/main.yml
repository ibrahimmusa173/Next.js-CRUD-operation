name: CI Pipeline

# This workflow runs every time you push to main or make a Pull Request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # -------------------------------------------
  # JOB 1: Build and Lint the Next.js Client
  # -------------------------------------------
  client-build:
    name: Build Next.js Client
    runs-on: ubuntu-latest
    defaults:
      run:
        # Tells GitHub to run these commands inside your client folder
        working-directory: ./my-crud-app/client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches your @types/node version
          cache: 'npm'
          cache-dependency-path: ./my-crud-app/client/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js Application
        run: npm run build

  # -------------------------------------------
  # JOB 2: Setup and Check the Express Server
  # -------------------------------------------
  server-check:
    name: Check Node.js Server
    runs-on: ubuntu-latest
    defaults:
      run:
        # Tells GitHub to run these commands inside your server folder
        working-directory: ./my-crud-app/server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./my-crud-app/server/package-lock.json

      - name: Install Dependencies
        run: npm install

      # Note: We are NOT running 'npm test' here because your server/package.json 
      # has a placeholder test that will intentionally fail the build.
      # Once you write real tests, you can uncomment the lines below:
      # - name: Run Tests
      #   run: npm test
